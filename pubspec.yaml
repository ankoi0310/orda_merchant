name: orda_merchant
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  iconsax_flutter: ^1.0.1
  scrollable_positioned_list: ^0.3.8
  dropdown_button2: ^3.0.0
  go_router: ^17.1.0
  supabase_flutter: ^2.12.2
  flutter_bloc: ^9.1.1
  fpdart: ^1.2.0
  google_fonts: ^8.0.2
  get_it: ^9.2.1
  skeletonizer: ^2.1.3
  shimmer: ^3.0.0
  shared_preferences: ^2.5.5
  flutter_dotenv: ^6.0.0
  image_picker: ^1.2.1
  mime: ^2.0.0
  intl: ^0.20.2

dev_dependencies:
  build_runner:
  flutter_gen_runner:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  very_good_analysis: ^10.2.0

flutter_gen:
  output: lib/config/gen/
  line_length: 80
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
